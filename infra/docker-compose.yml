version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: zerocaps-postgres
    environment:
      POSTGRES_USER: zerocaps
      POSTGRES_PASSWORD: zerocaps
      POSTGRES_DB: zerocaps
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zerocaps"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zerocaps-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ../backend
    container_name: zerocaps-backend
    env_file: ../backend/.env
    environment:
      # Override localhost → postgres service name inside the Docker network
      DATABASE_URL: postgresql+asyncpg://zerocaps:zerocaps@postgres:5432/zerocaps
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app

  frontend:
    build: ../frontend
    container_name: zerocaps-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres-data:
